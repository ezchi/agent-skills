description = "Analyze SV code for style violations"
prompt = """
Assume the code is wrong. Your job is to find where.

Analyze the SystemVerilog code in {{args}} for violations of the style guide.
Style Guide: !{cat __SKILLS_DIR__/systemverilog-core/references/style-guide.md}

Check:
- File naming suffixes (_tb.sv, _intf.sv, _pkg.sv, _ct.svh)
- Naming conventions (signals, modules, instances, ports)
- Clock & Reset naming (clk, rst, reset, or i_clk, i_rst, i_reset for ports)
- FSM state naming (state_curr/next)
- All case statements must use `unique case` — flag bare `case` and `priority case`
- _t suffix for types
- Width consistency
- Race-condition patterns:
  - `always_ff` block containing `=` (blocking assign) — must use `<=` only
  - `always_comb` block containing `<=` (NBA) — must use `=` only
  - `+=`, `-=`, `++`, `--` inside `always_ff` — no NBA form, must expand manually
  - Mixed blocking and NBA (`=` and `<=`) in the same `always` block
  - Manual sensitivity list (`always @(...)`) instead of `always_comb`/`always_ff`
  - NBA (`<=`) used for function return value or output argument assignment
  - Same signal driven by both `assign` and a procedural block

Do not confirm correctness. Only report violations with file, line, and what is wrong.
If you find nothing, say so in one line — do not pad with praise.
"""
