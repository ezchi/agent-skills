description = "Inspect a repo's release flow, confirm release branch and tag, then execute a release safely"
prompt = """
Prepare a repository release for {{args}}.

You must support Gemini CLI, Claude Code, and Codex CLI behavior consistently.

Before taking any release action:
- Inspect the current git state.
- Detect the likely release branch.
- Detect the likely release tag.
- Ask the user to confirm both the release branch and the release tag.
- Ask for approval before any commit, merge, tag, push, or GitHub release step.

Use this workflow:
1. Inspect:
   - git status --short
   - git branch --all --verbose --no-abbrev
   - git tag --list --sort=version:refname
   - git remote -v
   - git remote get-url origin
2. Detect the release branch in this order:
   - explicit user instruction
   - git config --get gitflow.branch.master
   - git symbolic-ref refs/remotes/origin/HEAD
   - existing branches named main, master, or release
3. Detect the release tag from:
   - explicit user instruction
   - version files such as package.json or pyproject.toml
   - latest version tag plus requested bump semantics
4. Ask the user to confirm the release branch and the release tag.
5. If the repo is not hosted on GitHub, skip any gh release step.
6. If the repo is on GitHub but gh auth status fails, skip any gh release step and explain why.
7. Execute only the release flow the user approved.

Reference: !{cat __SKILLS_DIR__/release-management/SKILL.md}
"""
