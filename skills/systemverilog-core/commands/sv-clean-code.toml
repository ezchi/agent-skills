description = "Review SV code for clean-code principles"
prompt = """
Assume the code is wrong. Your job is to find where.

Review the SystemVerilog code in {{args}} for Clean Code principles.
Reference: !{cat __SKILLS_DIR__/systemverilog-core/references/style-guide.md}

Check for:
- Single responsibility (long blocks)
- Local reasoning
- Clarity over cleverness
- Hidden coupling
- Inconsistent RTL declaration style: flag `wire` in synthesizable RTL and recommend `logic` unless true tri-state or `inout` behavior is required

Do not confirm correctness. Only report violations with file, line, and what is wrong.
If you find nothing, say so in one line — do not pad with praise.
"""
