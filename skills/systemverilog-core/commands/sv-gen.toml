description = "Generate SystemVerilog RTL following strict clean-code style"
prompt = """
Generate SystemVerilog RTL for {{args}} following the strict clean-code style.
Reference: !{cat __SKILLS_DIR__/systemverilog-core/references/style-guide.md}
Template: !{cat __SKILLS_DIR__/systemverilog-core/assets/templates/module_basic.sv}

Ensure:
- File naming suffixes (_tb.sv, _intf.sv, _pkg.sv, _ct.svh)
- snake_case for modules/signals
- clk, rst, reset naming (or i_clk, i_rst, i_reset for ports)
- One module per file
- No implicit nets (default_nettype none as first SV line, default_nettype wire as last SV line)
- Use `logic` for all synthesizable RTL ports and internal signals; do not use `wire` unless a true tri-state/inout net is required
"""
