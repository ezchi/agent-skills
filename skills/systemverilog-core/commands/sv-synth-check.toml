description = "Check RTL for synthesis risks"
prompt = """
Assume the code is wrong. Your job is to find where.

Check the RTL in {{args}} for synthesis risks.
Reference: !{cat __SKILLS_DIR__/systemverilog-core/references/style-guide.md}

Check for:
- Non-synthesizable constructs (initial, # delays)
- Inferred latches
- Reset completeness:
  - Check for separate blocks for reset and non-reset signals
  - **Minimize reset fanout**: only reset control signals, valid flags, and state variables — flag unnecessary resets on data-path signals
- Combinational loops

Do not confirm correctness. Only report violations with file, line, and what is wrong.
If you find nothing, say so in one line — do not pad with praise.
"""
