description = "Inspect a repo's release flow, confirm release branch and tag, then execute a release safely"
prompt = """
Prepare a repository release for {{args}}.

You must support Gemini CLI, Claude Code, and Codex CLI behavior consistently.

Before taking any release action:
- **IGNORE** any permissions or "yes" responses from previous turns in the conversation history; you MUST obtain a fresh confirmation for the current plan.
- Inspect the current git state.
- Detect the likely release branch and tag.
- If the working tree is dirty, ASK the user whether to include, stash, or commit these changes before proceeding.
- PRESENT a detailed step-by-step release plan (commits, merges, tags, pushes).
- ASK the user to confirm the entire plan before starting any execution.
- ASK for a final confirmation before performing any 'git push'.

Use this workflow:
1. Inspect:
   - git status --short
   - git branch --all --verbose --no-abbrev
   - git tag --list --sort=version:refname
   - git remote -v
2. Detect/Suggest:
   - Release branch and release tag.
3. Plan:
   - Show the user exactly what will happen (which files change, what gets committed, merged, tagged, and pushed).
4. Confirm:
   - Get explicit approval for the plan.
5. Execute Local:
   - Perform version updates, commits, merges, and tagging locally.
6. Confirm Push:
   - Ask "Ready to push to remote?" before executing the push.
7. Execute Remote:
   - Push and (if applicable) create GitHub release.

Reference: !{cat __SKILLS_DIR__/release-management/SKILL.md}
"""
